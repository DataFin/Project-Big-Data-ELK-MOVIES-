# =============================================================
# logstash-clean.conf — Pipeline de NETTOYAGE et NORMALISATION
# Equipe : Sandrine (lead), Audrey, Destine, Alexandre
# Feature : F3 - Nettoyage & normalisation
# Responsabilites :
#   - Conversions de types + parsing date : Destine
#   - Normalisation des listes            : Sandrine
#   - Traitement des anomalies            : Audrey
#   - Indexation dans movies_clean        : Destine
# =============================================================

input {
  file {
    path           => "/data/movies.csv"
    start_position => "beginning"
    sincedb_path   => "/dev/null"
    mode           => "read"
    type           => "movies_clean"
  }
}

filter {

  # ETAPE 1 : Parser le CSV — Destine
  csv {
    separator  => ","
    quote_char => '"'
    columns    => [
      "id", "title", "genres", "original_language", "overview",
      "popularity", "production_companies", "release_date",
      "budget", "revenue", "runtime", "status", "tagline",
      "vote_average", "vote_count", "credits", "keywords",
      "poster_path", "backdrop_path", "recommendations"
    ]
    skip_header => true
  }

  # ETAPE 2 : Conversion des types — Destine
  # Passage par float d'abord car "137.0" ne parse pas directement en integer
  mutate {
    convert => {
      "id"           => "integer"
      "popularity"   => "float"
      "vote_average" => "float"
      "budget"       => "float"
      "revenue"      => "float"
      "runtime"      => "float"
      "vote_count"   => "float"
    }
  }

  mutate {
    convert => {
      "budget"     => "integer"
      "revenue"    => "integer"
      "runtime"    => "integer"
      "vote_count" => "integer"
    }
  }

  # ETAPE 3 : Parsing de la date — Destine
  date {
    match          => ["release_date", "yyyy-MM-dd"]
    target         => "release_date"
    timezone       => "UTC"
    tag_on_failure => ["_dateparsefailure"]
  }

  # ETAPE 4 : Normalisation des listes — Sandrine
  if [genres] and [genres] != "" {
    mutate { split => { "genres" => "-" } }
  }

  if [keywords] and [keywords] != "" {
    mutate { split => { "keywords" => "-" } }
  }

  if [credits] and [credits] != "" {
    mutate { split => { "credits" => "-" } }
  }

  if [production_companies] and [production_companies] != "" {
    mutate { split => { "production_companies" => "-" } }
  }

  if [recommendations] and [recommendations] != "" {
    mutate { split => { "recommendations" => "-" } }
  }

  # ETAPE 5 : Traitement des anomalies — Audrey
  if [budget] and [budget] == 0 {
    mutate { replace => { "budget" => -1 } }
  }

  if [revenue] and [revenue] == 0 {
    mutate { replace => { "revenue" => -1 } }
  }

  if [runtime] and [runtime] == 0 {
    mutate { replace => { "runtime" => -1 } }
  }

  if ![tagline] or [tagline] == "" {
    mutate { replace => { "tagline" => "N/A" } }
  }

  if ![overview] or [overview] == "" {
    mutate { replace => { "overview" => "N/A" } }
  }

  if ![title] or [title] == "" {
    drop { }
  }

  if ![id] {
    drop { }
  }

  # ETAPE 6 : Suppression des champs techniques
  mutate {
    remove_field => ["message", "@version", "host", "log", "event", "type"]
  }

}

output {
  elasticsearch {
    hosts       => ["http://elasticsearch:9200"]
    index       => "movies_clean"
    document_id => "%{id}"
  }

  stdout { codec => dots }
}
