input {
  elasticsearch {
    hosts  => ["http://elasticsearch:9200"]
    index  => "movies_raw"
    query  => '{ "query": { "match_all": {} } }'
    size   => 1000
    scroll => "10m"
  }
}

filter {

  # Conversion des types
  mutate {
    convert => {
      "id"           => "integer"
      "popularity"   => "float"
      "vote_average" => "float"
      "budget"       => "integer"
      "revenue"      => "integer"
      "runtime"      => "integer"
      "vote_count"   => "integer"
    }
  }

  # 🔴 IMPORTANT : nettoyer release_date AVANT parsing
  if [release_date] == "unknown" or [release_date] == "" {
    mutate { remove_field => ["release_date"] }
  }

  # Parsing seulement si la date existe
  if [release_date] {
    date {
      match    => ["release_date", "yyyy-MM-dd"]
      target   => "release_date"
      timezone => "UTC"
    }
  }

  # Normalisation des listes
  if [genres] and [genres] != "" {
    mutate { split => { "genres" => "-" } }
  }
  if [keywords] and [keywords] != "" {
    mutate { split => { "keywords" => "-" } }
  }
  if [credits] and [credits] != "" {
    mutate { split => { "credits" => "-" } }
  }
  if [production_companies] and [production_companies] != "" {
    mutate { split => { "production_companies" => "-" } }
  }

  # Anomalies critiques
  if ![title] or [title] == "" { drop {} }
  if ![id] { drop {} }

  # Suppression des valeurs numériques invalides
  if [budget] == 0  { mutate { remove_field => ["budget"] } }
  if [revenue] == 0 { mutate { remove_field => ["revenue"] } }
  if [runtime] == 0 { mutate { remove_field => ["runtime"] } }

  if [vote_count] == 0 {
    mutate { remove_field => ["vote_average"] }
  }

  # Langues
  if [original_language] == "cn" {
    mutate { replace => { "original_language" => "zh" } }
  }
  if [original_language] == "xx" {
    mutate { remove_field => ["original_language"] }
  }
}

output {
  elasticsearch {
    hosts       => ["http://elasticsearch:9200"]
    index       => "movies_clean"
    document_id => "%{id}"
  }
  stdout { codec => dots }
}