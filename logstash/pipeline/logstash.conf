# =============================================================
# logstash-raw.conf — Pipeline d'ingestion BRUTE
# Feature : F2 - Ingestion brute
# Responsable : Sandrine
# Description : Lit movies.csv et indexe les données TELLES QUELLES
#               dans l'index movies_raw, sans aucune transformation.
#               L'objectif est d'avoir une copie brute du dataset
#               pour pouvoir mesurer l'impact du nettoyage après.
# =============================================================

# -----------------------------------------------------------
# INPUT : d'où viennent les données ?
# -----------------------------------------------------------
input {
  file {
    # Chemin vers le fichier CSV dans le conteneur Docker
    # (le dossier ./data est monté en /data dans docker-compose.yml)
    path => "/data/movies.csv"

    # "beginning" = Logstash lit le fichier depuis le début
    # (par défaut il lirait seulement les nouvelles lignes)
    start_position => "beginning"

    # Désactive la mémoire de position pour relire le fichier
    # à chaque redémarrage de Logstash
    sincedb_path => "/dev/null"

    # Indique que c'est un fichier de données, pas un log en temps réel
    mode => "read"

    # Type pour identifier la source dans le pipeline
    type => "movies_raw"
  }
}

# -----------------------------------------------------------
# FILTER : comment traiter les données ?
# -----------------------------------------------------------
filter {

  # -----------------------------------------------------------
  # ÉTAPE 1 : Parser le CSV
  # On lit les colonnes dans l'ordre exact du fichier
  # -----------------------------------------------------------
  csv {
    separator => ","
    quote_char => '"'

    # Ordre exact des colonnes dans movies.csv
    columns => [
      "id",
      "title",
      "genres",
      "original_language",
      "overview",
      "popularity",
      "production_companies",
      "release_date",
      "budget",
      "revenue",
      "runtime",
      "status",
      "tagline",
      "vote_average",
      "vote_count",
      "credits",
      "keywords",
      "poster_path",
      "backdrop_path",
      "recommendations"
    ]

    # Ignore la première ligne (en-têtes du CSV)
    skip_header => true
  }

  # -----------------------------------------------------------
  # ÉTAPE 2 : Supprimer les champs techniques inutiles
  # Ces champs sont ajoutés automatiquement par Logstash
  # mais ne font pas partie de nos données films
  # -----------------------------------------------------------
  mutate {
    remove_field => ["message", "@version", "host", "log", "event"]
  }

}

# -----------------------------------------------------------
# OUTPUT : où envoyer les données ?
# -----------------------------------------------------------
output {

  # Envoi vers Elasticsearch dans l'index movies_raw
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]

    # Index de destination : données brutes non nettoyées
    index => "movies_raw"

    # Utilise l'id du film comme identifiant unique du document
    # Évite les doublons si Logstash relance l'ingestion
    document_id => "%{id}"
  }

  # Affiche chaque document dans les logs Logstash
  # Utile pour vérifier que l'ingestion fonctionne
  # À désactiver en production pour ne pas surcharger les logs
  stdout {
    codec => dots
    # "dots" affiche un point par document ingéré
    # plus lisible que d'afficher chaque document entier
  }

}
